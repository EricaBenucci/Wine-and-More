  <style>
    body, html { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; height: 100%; color: white; }
    body { background-image: url('contattaci.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
    body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: -1; }

    /* Header e Hamburger */
    header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background-color: #5e0f0f; padding: 10px 20px; position: fixed; top: 0; width: 100%; z-index: 1000; height: 80px; box-sizing: border-box; }
    .hamburger-menu { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .hamburger-menu .line { width: 30px; height: 3px; background-color: #fff; border-radius: 5px; }
    .header-center-col { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .logo-container img { height: 60px; }
    
    .menu-pop-up { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background-color: #5e0f0f; padding-top: 100px; transition: left 0.3s ease-in-out; z-index: 999; display: flex; flex-direction: column; }
    .menu-pop-up.open { left: 0; }
    .menu-pop-up a { color: white; padding: 20px 30px; text-decoration: none; font-size: 1.2em; font-weight: bold; }

    .content { padding-top: 150px; max-width: 600px; margin: 0 auto; text-align: center; }
    h1 { font-family: 'Dancing Script', cursive; font-size: 50px; margin-bottom: 30px; }
    .contact-container { background-color: rgba(0, 0, 0, 0.6); padding: 40px; border-radius: 15px; }
    .btn { display: block; width: 80%; margin: 15px auto; padding: 15px; text-decoration: none; color: white; font-weight: bold; border-radius: 8px; transition: transform 0.2s; }
    .btn-mail { background-color: #5e0f0f; }
    .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

    footer { text-align: center; padding: 20px; background-color: #5e0f0f; color: white; position: fixed; bottom: 0; width: 100%; }
  </style>
</head>
<body>

  <header>
    <button class="hamburger-menu" id="hamburgerBtn"><span class="line"></span><span class="line"></span><span class="line"></span></button>
    <div class="header-center-col"><a href="index.html"><img src="logo wine-and-more-xp.jpg" alt="Logo" style="height:60px;"></a></div>
    <div></div>
  </header>

  <nav class="menu-pop-up" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="degustazioni-e-lezioni.html">DEGUSTAZIONI</a>
    <a href="lezioni.html">LEZIONI</a>
    <a href="chi-siamo.html">CHI SONO</a>
    <a href="quiz-vino.html">QUIZ</a>
    <a href="contatti.html">CONTATTI</a>
  </nav>

  <div class="content">
    <h1>Contattaci</h1>
    <div class="contact-container">
      <p>Per qualsiasi informazione scrivete a:</p>
      <a href="mailto:info@wineandmore.it" class="btn btn-mail"><i class="fas fa-envelope"></i> info@wineandmore.it</a>
      <a href="https://www.instagram.com/wineandmorexp/" target="_blank" class="btn btn-ig"><i class="fab fa-instagram"></i> Segui su Instagram</a>
    </div>
  </div>

  <script>
    document.getElementById('hamburgerBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('open');
  </script>
</body>
</html>
