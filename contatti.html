<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contattaci – Wine and More Experiences</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="cookie-style.css">
  <script src="cookie-banner.js" defer></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      background-image: url('contattaci.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      background-color: #5e0f0f;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      padding: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 5px 15px;
      font-weight: bold;
      font-size: 18px;
    }

    .content {
      padding-top: 150px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 50px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 30px;
    }

    .contact-container {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 15px;
      color: white;
    }

    .info-text {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 80%;
      margin: 15px auto;
      padding: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      font-size: 18px;
      transition: transform 0.2s;
    }

    .btn:hover { transform: scale(1.05); }

    .btn-mail { background-color: #d4af37; }
    .btn-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #5e0f0f;
      color: #ffffff;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    @media screen and (max-width: 768px) {
      nav a { font-size: 12px; margin: 4px 8px; }
      h1 { font-size: 36px; }
      .contact-container { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">HOME</a>
    <a href="chi-siamo.html">CHI SONO</a>
    <a href="degustazioni-e-lezioni.html">DEGUSTAZIONI</a>
    <a href="lezioni.html">LEZIONI</a>
    <a href="curiosita.html">LO SAPEVI CHE?</a>
    <a href="contact.html">ENG</a>
    <a href="#">SEGUIMI</a>
  </nav>

  <div class="content">
    <h1>Contattaci</h1>
    <div class="contact-container">
      <p class="info-text">Per qualsiasi informazione scrivete a:</p>
      <a href="mailto:info@wineandmore.it" class="btn btn-mail">
        <i class="fas fa-envelope"></i> info@wineandmore.it
      </a>
      <a href="https://www.instagram.com/wineandmorexp/" target="_blank" class="btn btn-ig">
        <i class="fab fa-instagram"></i> Segui su Instagram
      </a>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Wine and More Experiences – Tutti i diritti riservati</p>
    <a href="privacy-policy.html" style="color: white;">Privacy Policy</a> | 
    <a href="cookie-policy.html" style="color: white;">Cookie Policy</a> | 
    <a href="#" onclick="openCookiePreferences()" style="color: white;">Gestisci preferenze cookie</a>
  </footer>

</body>
</html>
