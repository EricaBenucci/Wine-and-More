  <style>
    body, html { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; height: 100%; background-color: #fff; }
    
    /* --- HEADER E MENU --- */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background-color: #5e0f0f;
      padding: 10px 20px;
      position: fixed;
      top: 0; width: 100%; z-index: 1000;
      height: 80px; box-sizing: border-box;
    }

    .header-left-col { display: flex; align-items: center; }
    .hamburger-menu { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .hamburger-menu .line { width: 30px; height: 3px; background-color: #fff; border-radius: 5px; }

    .header-center-col { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .logo-container img { height: 60px; }
    .flag { width: 30px; height: auto; cursor: pointer; transition: transform 0.2s; }
    .flag:hover { transform: scale(1.1); }

    .header-right-col { display: flex; justify-content: flex-end; align-items: center; }
    .ig-link { font-size: 1.5em; color: #fff; }

    /* Menu a scomparsa */
    .menu-pop-up {
      position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
      background-color: #5e0f0f; padding-top: 100px;
      transition: left 0.3s ease-in-out; z-index: 999; display: flex; flex-direction: column;
    }
    .menu-pop-up.open { left: 0; }
    .menu-pop-up a { color: white; padding: 20px 30px; text-decoration: none; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* --- CONTENUTO --- */
    .header-bar { background-color: #5e0f0f; text-align: center; padding: 20px 20px 40px; margin-top: 80px; }
    .header-bar h1 { font-family: 'Dancing Script', cursive; font-size: 100px; margin: 0; color: white; }
    .header-bar p { font-size: 24px; color: white; margin: 10px 0 0; }

    .hero { display: flex; flex-direction: row; height: calc(100vh - 200px); }
    .hero-box { flex: 1; background-size: cover; background-position: center; position: relative; display: flex; justify-content: center; align-items: center; text-decoration: none; }
    .hero-text { background-color: rgba(255, 255, 255, 0.8); padding: 20px 40px; border-radius: 10px; font-size: 30px; color: #5e0f0f; text-align: center; transition: transform 0.3s ease; text-transform: uppercase; }
    .hero-text:hover { transform: scale(1.05); }

    footer { text-align: center; padding: 20px; background-color: #5e0f0f; color: white; }

    @media screen and (max-width: 768px) {
      .header-bar h1 { font-size: 50px; }
      .hero { flex-direction: column; height: auto; }
      .hero-box { height: 40vh; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left-col">

        <span class="line"></span><span class="line"></span><span class="line"></span>
      </button>
    </div>
    
    <div class="header-center-col">
      <a href="index.html"><img src="https://flagcdn.com/it.svg" class="flag" alt="Italiano"></a>
      <div class="logo-container">
        <a href="index.html"><img src="logo wine-and-more-xp.jpg" alt="Logo Wine and More" /></a>
      </div>
      <a href="index-en.html"><img src="https://flagcdn.com/gb.svg" class="flag" alt="English"></a>
    </div>

    <div class="header-right-col">
      <a href="https://www.instagram.com/wineandmorexp/" target="_blank" class="ig-link">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </header>

  <nav class="menu-pop-up" id="mobileMenu">
    <a href="index.html">HOME</a>

    <a href="lezioni.html">LEZIONI</a>
    <a href="staff.html">STAFF</a>
    <a href="quiz-vino.html">QUIZ</a>
    <a href="contatti.html">CONTATTI</a>
  </nav>

  <div class="header-bar">
    <h1>Wine and More Experiences</h1>
    <p>Degustazioni | Training | Team Building</p>
  </div>

  <div class="hero">
    <a href="degustazioni-vino.html" class="hero-box" style="background-image: url('cantina2.jpg');">
      <div class="hero-text">Degustazioni</div>
    </a>
    <a href="lezioni.html" class="hero-box" style="background-image: url('docente1.jpg');">
      <div class="hero-text">Lezioni</div>

  <footer>

    <a href="cookie-policy.html" style="color: white; margin-right: 15px;">Cookie Policy</a>
    <a href="#" onclick="openCookiePreferences()" style="color: white;">Gestisci preferenze cookie</a>
  </footer>

  <script>
    const hb = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('mobileMenu');
    
    hb.onclick = function() { 
      menu.classList.toggle('open'); 
    };

    document.addEventListener('click', function(event) {
        if (!menu.contains(event.target) && !hb.contains(event.target)) {
            menu.classList.remove('open');
        }
    });
  </script>
</body>
</html>
