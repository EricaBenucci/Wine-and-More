      display: flex;
      flex-wrap: wrap;

      background-color: #5e0f0f;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;

    nav a { color: white; text-decoration: none; margin: 5px 15px; font-weight: bold; font-size: 18px; }

    .content {

      padding: 10px 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .contact-box {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 350px;
      margin: 20px auto;
      padding: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      font-size: 18px;
      transition: background 0.3s;
    }

    .btn-mail { background-color: #5e0f0f; }
    .btn-mail:hover { background-color: #7a1c1c; }
    
    .btn-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    .btn-ig:hover { opacity: 0.9; }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #5e0f0f;
      color: #ffffff;
      margin-top: auto;
    }
    footer p, footer a { color: #ffffff; font-size: 14px; }

    @media screen and (max-width: 768px) {
      nav a { font-size: 12px; margin: 4px 8px; }
      h1 { font-size: 36px; }
