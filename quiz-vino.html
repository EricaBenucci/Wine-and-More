<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine and More – Quiz sul Vino</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="cookie-style.css">
  <script src="cookie-banner.js" defer></script>

  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; height: 100%; color: white; }

    /* Sfondo */
    body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('vigneto.jpg'); background-size: cover; background-position: center; background-attachment: fixed; z-index: -2; }
    body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: -1; }

    /* --- HEADER E MENU (Uniformato) --- */
    header {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      background-color: #5e0f0f; padding: 10px 20px; position: fixed;
      top: 0; width: 100%; z-index: 1000; height: 80px; box-sizing: border-box;
    }
    .header-left-col { display: flex; align-items: center; }
    .hamburger-menu { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .hamburger-menu .line { width: 30px; height: 3px; background-color: #fff; border-radius: 5px; }

    .header-center-col { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .logo-container img { height: 60px; }
    .flag { width: 30px; height: auto; cursor: pointer; }

    .header-right-col { display: flex; justify-content: flex-end; align-items: center; }
    .ig-link { font-size: 1.5em; color: #fff; }

    .menu-pop-up {
      position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
      background-color: #5e0f0f; padding-top: 100px; transition: left 0.3s ease-in-out; 
      z-index: 999; display: flex; flex-direction: column;
    }
    .menu-pop-up.open { left: 0; }
    .menu-pop-up a { color: white; padding: 20px 30px; text-decoration: none; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* Contenuto Quiz (Esempio) */
    .main-content { display: flex; justify-content: center; padding: 120px 20px 80px; }
    .quiz-container { max-width: 800px; width: 100%; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; text-align: center; }
    
    footer { text-align: center; padding: 20px; background-color: #5e0f0f; color: #ffffff; }

    @media screen and (max-width: 768px) {
      .header-bar h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left-col">
      <button class="hamburger-menu" id="hamburgerBtn" aria-label="Menu">
        <span class="line"></span><span class="line"></span><span class="line"></span>
      </button>
    </div>
    <div class="header-center-col">
      <a href="index.html"><img src="https://flagcdn.com/it.svg" class="flag" alt="Italiano"></a>
      <div class="logo-container">
        <a href="index.html"><img src="logo wine-and-more-xp.jpg" alt="Logo Wine and More" /></a>
      </div>
      <a href="index-en.html"><img src="https://flagcdn.com/gb.svg" class="flag" alt="English"></a>
    </div>
    <div class="header-right-col">
      <a href="https://www.instagram.com/wineandmorexp/" target="_blank" class="ig-link">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </header>

  <nav class="menu-pop-up" id="mobileMenu">
    <a href="index.html">HOME</a>
    <a href="degustazioni-vino.html">DEGUSTAZIONI</a>
    <a href="lezioni-vino.html">LEZIONI</a>
    <a href="staff.html">STAFF</a>
    <a href="quiz-vino.html">QUIZ</a>
    <a href="contatti.html">CONTATTI</a>
  </nav>

  <div class="main-content">
    <div class="quiz-container">
      <h1>Quiz sul Vino</h1>
      <p>Mettiti alla prova con le nostre domande sul mondo del vino!</p>
      </div>
  </div>

  <footer>
    <p>&copy; 2026 Wine and More Experiences – Tutti i diritti riservati</p>
    <a href="privacy-policy.html" style="color: white; margin-right: 15px;">Privacy Policy</a>
    <a href="cookie-policy.html" style="color: white; margin-right: 15px;">Cookie Policy</a>
    <a href="#" onclick="openCookiePreferences()" style="color: white;">Gestisci preferenze cookie</a>
  </footer>

  <script>
    const hb = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('mobileMenu');
    hb.onclick = function() { menu.classList.toggle('open'); };
    document.addEventListener('click', function(event) {
        if (!menu.contains(event.target) && !hb.contains(event.target)) {
            menu.classList.remove('open');
        }
    });
  </script>
</body>
</html>
