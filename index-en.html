    header {

    .menu-pop-up {
      position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
      background-color: #5e0f0f; padding-top: 100px; transition: left 0.3s ease-in-out; 
      z-index: 999; display: flex; flex-direction: column;
    }
    .menu-pop-up.open { left: 0; }
    .menu-pop-up a { color: white; padding: 20px 30px; text-decoration: none; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }

  <script>
    const hb = document.getElementById('hamburgerBtn');
